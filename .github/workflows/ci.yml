name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Rust toolchain channel
        id: rust_toolchain
        run: |
          channel="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*$/\1/p' rust-toolchain.toml | head -n1)"
          test -n "$channel"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Install nightly toolchain for fmt and clippy
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Install Rust toolchain from rust-toolchain.toml
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo +nightly fmt --all --check

      - name: Lint
        run: cargo +nightly clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets --all-features

      - name: Test
        run: cargo test --all-features
